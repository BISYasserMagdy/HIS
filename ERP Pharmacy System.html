<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pharmacy ERP System</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Segoe UI, Arial, sans-serif;
      background: #f3f7fb;
      color: #1f2937;
      min-height: 100vh;
    }

    header {
      background: #1d4ed8;
      color: #fff;
      padding: 1.5rem 1rem;
      text-align: center;
      box-shadow: 0 2px 8px rgba(29, 78, 216, 0.15);
    }

    header h1 {
      font-size: 2rem;
      margin-bottom: 0.5rem;
    }

    header p {
      font-size: 0.95rem;
      opacity: 0.95;
    }

    .container {
      max-width: 500px;
      margin: 3rem auto;
      padding: 0 1rem;
    }

    .login-card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
      padding: 2.5rem;
    }

    .form-group {
      margin-bottom: 1.5rem;
    }

    label {
      display: block;
      margin-bottom: 0.5rem;
      font-weight: 600;
      color: #1d4ed8;
      font-size: 0.95rem;
    }

    input[type="text"],
    input[type="password"] {
      width: 100%;
      padding: 0.85rem 1rem;
      border: 2px solid #e5e7eb;
      border-radius: 8px;
      font-size: 1rem;
      transition: all 0.3s ease;
      font-family: inherit;
    }

    input[type="text"]:focus,
    input[type="password"]:focus {
      outline: none;
      border-color: #1d4ed8;
      background-color: #f0f4ff;
    }

    .submit-btn {
      width: 100%;
      padding: 1rem;
      background: #2563eb;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      margin-top: 0.5rem;
    }

    .submit-btn:hover {
      background: #1d4ed8;
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(37, 99, 235, 0.3);
    }

    .submit-btn:active {
      transform: translateY(0);
    }

    .error-message {
      background: #fee2e2;
      color: #991b1b;
      padding: 1rem;
      border-radius: 8px;
      margin-bottom: 1.5rem;
      border-left: 4px solid #dc2626;
      display: none;
    }

    .error-message.show {
      display: block;
    }

    .success-message {
      background: #dcfce7;
      color: #166534;
      padding: 1rem;
      border-radius: 8px;
      margin-bottom: 1.5rem;
      border-left: 4px solid #22c55e;
      display: none;
    }

    .success-message.show {
      display: block;
    }

    .info-box {
      background: #eef5ff;
      border: 2px solid #1d4ed8;
      border-radius: 8px;
      padding: 1rem;
      margin-top: 1.5rem;
      font-size: 0.9rem;
      color: #1f2937;
    }

    .info-box h4 {
      color: #1d4ed8;
      margin-bottom: 0.5rem;
    }

    .info-box p {
      margin: 0.3rem 0;
    }

    .loader {
      display: none;
      border: 4px solid #e5e7eb;
      border-top: 4px solid #2563eb;
      border-radius: 50%;
      width: 24px;
      height: 24px;
      animation: spin 1s linear infinite;
      margin: 0 auto 0.5rem;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .submit-btn:disabled {
      opacity: 0.7;
      cursor: not-allowed;
    }

    footer {
      text-align: center;
      padding: 2rem 1rem;
      color: #6b7280;
      font-size: 0.9rem;
    }

    footer a {
      color: #1d4ed8;
      text-decoration: none;
    }

    footer a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <header>
    <h1>💊 Pharmacy ERP System</h1>
    <p>Pharmacist Management Portal</p>
  </header>

  <div class="container">
    <div class="login-card">
      <div class="error-message" id="errorMessage"></div>
      <div class="success-message" id="successMessage"></div>

      <form id="loginForm" method="POST" action="http://localhost/ERP%20Pharmacy%20System.php">
        <div class="loader" id="loader"></div>

        <div class="form-group">
          <label for="pharmacistID">Pharmacist ID</label>
          <input 
            type="text" 
            id="pharmacistID" 
            name="pharmacist_id" 
            placeholder="Enter your ID" 
            required
            autocomplete="off"
          >
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input 
            type="password" 
            id="password" 
            name="password" 
            placeholder="Enter your password" 
            required
            autocomplete="off"
          >
        </div>

        <button type="submit" class="submit-btn" id="submitBtn">Login to System</button>
      </form>

      <div class="info-box">
        <h4>📋 Demo Credentials:</h4>
        <p><strong>ID:</strong> PHARM001</p>
        <p><strong>Password:</strong> password123</p>
      </div>
    </div>

    <div style="text-align: center; margin-top: 1.5rem;">
      <a href="Home Page.html" style="color: #1d4ed8; text-decoration: none; font-weight: 600;">← Back to Home</a>
    </div>
  </div>

  <footer>
    <p>&copy; 2026 Healthcare Hub - Pharmacy Management System. All rights reserved.</p>
  </footer>

  <script>
    const form = document.getElementById('loginForm');
    const submitBtn = document.getElementById('submitBtn');
    const loader = document.getElementById('loader');
    const errorMessage = document.getElementById('errorMessage');
    const successMessage = document.getElementById('successMessage');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();

      // Clear previous messages
      errorMessage.classList.remove('show');
      successMessage.classList.remove('show');

      // Show loader
      loader.style.display = 'block';
      submitBtn.disabled = true;

      const formData = new FormData(form);

      try {
        const response = await fetch('http://localhost/ERP%20Pharmacy%20System.php', {
          method: 'POST',
          body: formData
        });

        const data = await response.json();

        if (data.success) {
          successMessage.textContent = data.message;
          successMessage.classList.add('show');
          
          // Parse and store pharmacist name
          const fullName = data.pharmacist_name || 'Pharmacist';
          const nameParts = fullName.trim().split(/\s+/);
          
          let firstName = 'Pharmacist';
          let lastName = '';
          
          if (nameParts.length === 1) {
            firstName = nameParts[0];
          } else if (nameParts.length > 1) {
            firstName = nameParts[0];
            lastName = nameParts.slice(1).join(' ');
          }
          
          localStorage.setItem('pharmacistFirstName', firstName);
          localStorage.setItem('pharmacistLastName', lastName);
          
          // Redirect after 1.5 seconds
          setTimeout(() => {
            window.location.href = 'ERP Dashboard.html';
          }, 1500);
        } else {
          errorMessage.textContent = data.message || 'Login failed. Please try again.';
          errorMessage.classList.add('show');
        }
      } catch (error) {
        errorMessage.textContent = 'An error occurred. Please try again later.';
        errorMessage.classList.add('show');
        console.error('Error:', error);
      } finally {
        loader.style.display = 'none';
        submitBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
