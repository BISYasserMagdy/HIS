<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Health Information System - Home</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #f3f7fb;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .container {
      background: #fff;
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      overflow: hidden;
      max-width: 900px;
      width: 90%;
      display: flex;
      flex-wrap: wrap;
    }

    .left-panel {
      flex: 1;
      min-width: 300px;
      background: #1d4ed8;
      color: #fff;
      padding: 3rem 2rem;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .left-panel h1 {
      font-size: 2.5rem;
      margin: 0 0 1rem;
      line-height: 1.2;
    }

    .left-panel p {
      font-size: 1.1rem;
      opacity: 0.9;
      line-height: 1.6;
      margin: 0;
    }

    .left-panel .icon {
      font-size: 4rem;
      margin-bottom: 1.5rem;
    }

    .right-panel {
      flex: 1;
      min-width: 300px;
      padding: 3rem 2rem;
    }

    .right-panel h2 {
      margin: 0 0 2rem;
      color: #1f2937;
      font-size: 1.8rem;
    }

    .nav-links {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .nav-link {
      display: flex;
      align-items: center;
      padding: 1rem 1.5rem;
      background: #f3f7fb;
      border-radius: 12px;
      text-decoration: none;
      color: #1f2937;
      font-weight: 600;
      transition: all 0.3s ease;
      border: 2px solid transparent;
    }

    .nav-link:hover {
      background: #e0e7ff;
      border-color: #1d4ed8;
      transform: translateX(5px);
    }

    .nav-link .link-icon {
      font-size: 1.5rem;
      margin-right: 1rem;
      width: 40px;
      height: 40px;
      background: #2563eb;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
    }

    .nav-link .arrow {
      margin-left: auto;
      font-size: 1.2rem;
      opacity: 0.5;
    }

    .footer-links {
      margin-top: 2rem;
      display: flex;
      gap: 1rem;
    }

    .footer-links a {
      color: #2563eb;
      text-decoration: none;
      font-size: 0.9rem;
    }

    .footer-links a:hover {
      text-decoration: underline;
    }

    @media (max-width: 600px) {
      .container {
        flex-direction: column;
      }

      .left-panel {
        padding: 2rem 1.5rem;
        text-align: center;
      }

      .left-panel h1 {
        font-size: 1.8rem;
      }

      .right-panel {
        padding: 2rem 1.5rem;
      }
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="left-panel">
      <div class="icon">🏥</div>
      <h1>Health Information System</h1>
      <p>Your comprehensive platform for healthcare management, pharmacy operations, appointments, and health guidance.
      </p>
    </div>
    <div class="right-panel">
      <h2>Quick Access</h2>
      <div class="nav-links">
        <a href="Home Page.html" class="nav-link">
          <span class="link-icon">🏠</span>
          <span>Home Page</span>
          <span class="arrow">→</span>
        </a>
        <a href="ERP Pharmacy Sign in Page.html" class="nav-link">
          <span class="link-icon">💊</span>
          <span>ERP Pharmacy System</span>
          <span class="arrow">→</span>
        </a>
        <a href="Appointments Page.html" class="nav-link">
          <span class="link-icon">📅</span>
          <span>Book Appointment</span>
          <span class="arrow">→</span>
        </a>
        <a href="Health_Chatbot.html" class="nav-link">
          <span class="link-icon">🤖</span>
          <span>Health Chatbot</span>
          <span class="arrow">→</span>
        </a>
      </div>
      <div class="footer-links">
        <a href="Home Page AR.html">العربية</a>
        <span>|</span>
        <a href="#">Help</a>
        <span>|</span>
        <a href="#">Contact</a>
      </div>
    </div>
  </div>
</body>

</html>
